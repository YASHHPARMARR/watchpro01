<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c4a5d",
                        "background-light": "#f7f6f7",
                        "background-dark": "#1c1618",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="flex min-h-screen w-full">
<!-- Left Side: Branding & Testimonial -->
<div class="hidden lg:flex w-1/2 bg-background-dark flex-col justify-between p-12 relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<!-- Logo Area -->
<div class="flex items-center gap-3 z-10">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z" fill="currentColor"></path>
</svg>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-slate-100">CHRONOS</h1>
</div>
<!-- Central Visual -->
<div class="flex flex-1 items-center justify-center z-10">
<div class="relative w-full max-w-md aspect-square flex items-center justify-center">
<div class="absolute inset-0 bg-primary/5 rounded-full animate-pulse"></div>
<!-- Large Watch/Clock SVG Illustration -->
<svg class="w-4/5 h-4/5 text-primary opacity-80" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5" viewbox="0 0 24 24">
<circle cx="12" cy="12" r="10"></circle>
<polyline points="12 6 12 12 16 14"></polyline>
<path d="M12 2v2"></path>
<path d="M12 20v2"></path>
<path d="M20 12h2"></path>
<path d="M2 12h2"></path>
</svg>
</div>
</div>
<!-- Testimonial Section -->
<div class="z-10 max-w-lg">
<blockquote class="text-3xl font-light leading-snug text-slate-100 mb-6 italic">
                    "The ultimate tool for mastering my schedule. Elegant and precise."
                </blockquote>
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden border border-primary/30">
<img class="w-full h-full object-cover" data-alt="Portrait of Julian V Creative Director" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKZpeac8Ja9B1UHGO-n84HhFk2i3d6OJRUI7a1PzHhxIvX7QMdq-21XjVm-whNjssR0F__1M9N_v0Tp3ACExjO1wbtAG2N8yxUhqjgplWcWU_XZUTIgwQ85Xe4FkZxZBCZQxmtD2BhaNMNG1eLJLrNVJo1Kd8rcR8oZAq80M5jCtKPcaRDKYGfof-2t0jLsVdMOhtpBZ_jXCrqTYxWr7IlnJHfoFP74LjV_phn8fCGvZfQBgGjWPGzHkFa-v9qJT9uGkzA0kahQZNN"/>
</div>
<div>
<p class="font-bold text-slate-100 uppercase tracking-widest text-xs">Julian V.</p>
<p class="text-primary/70 text-sm">Creative Director</p>
</div>
</div>
</div>
</div>
<!-- Right Side: Auth Form -->
<div class="w-full lg:w-1/2 bg-white flex flex-col items-center justify-center p-8 lg:p-24">
<div class="w-full max-w-md">
<!-- Mobile Logo (visible only on small screens) -->
<div class="flex lg:hidden items-center justify-center gap-3 mb-12">
<div class="size-6 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-xl font-bold tracking-tight text-slate-900">CHRONOS</h2>
</div>
<div class="mb-10 text-center lg:text-left">
<h2 class="text-3xl font-extrabold text-slate-900 mb-2">Welcome back</h2>
<p class="text-slate-500">Sign in to your account to continue</p>
</div>
<!-- Tabs -->
<div class="flex border-b border-primary/10 mb-8">
<button class="flex-1 py-4 text-sm font-bold border-b-2 border-primary text-primary transition-all">
                        Sign In
                    </button>
<button class="flex-1 py-4 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition-all">
                        Create Account
                    </button>
</div>
<!-- Form -->
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold text-slate-700 mb-2" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg bg-background-light focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all sm:text-sm" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-sm font-semibold text-slate-700" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg bg-background-light focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all sm:text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600" for="remember-me">
                            Remember me for 30 days
                        </label>
</div>
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors uppercase tracking-widest" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-white text-slate-500 font-medium">Or continue with</span>
</div>
</div>
<div class="mt-6">
<button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-lg shadow-sm bg-white text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                            Google
                        </button>
</div>
</div>
<footer class="mt-12 text-center">
<p class="text-xs text-slate-400">
                        © 2024 CHRONOS Mastery Systems. All rights reserved. <br/>
<a class="hover:text-primary underline" href="#">Privacy Policy</a> &amp; <a class="hover:text-primary underline" href="#">Terms of Service</a>
</p>
</footer>
</div>
</div>
</div>
</body></html>
